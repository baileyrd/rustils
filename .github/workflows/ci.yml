name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        toolchain: [stable, "1.75"] # 1.75 = MSRV; bump per RFC v2 policy
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.toolchain }}
          components: rustfmt, clippy
      - name: fmt
        run: cargo fmt --all --check
      - name: clippy (warnings are errors)
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: test
        run: cargo test --workspace
      # D-12 / Track P: the whole platform-linux suite (parity included)
      # re-runs with the rusty_libc raw-syscall path swapped in for the
      # replaced call families. Linux + stable only: the feature is
      # meaningless on Windows, and rusty_libc's MSRV (1.88) is above the
      # workspace floor (1.75) — Track P is opt-in precisely so the floor
      # holds (see platform-linux/Cargo.toml).
      - name: test platform-linux with track-p (raw-syscall backend)
        if: matrix.os == 'ubuntu-latest' && matrix.toolchain == 'stable'
        run: |
          cargo clippy -p platform-linux --features track-p --all-targets -- -D warnings
          cargo test -p platform-linux --features track-p
      # Tun surface (D14): TUNSETIFF needs CAP_NET_ADMIN, which the
      # hosted ubuntu-latest runner's default user lacks — the `test`
      # step above already ran tun_parity.rs, but every one of its
      # tests skipped gracefully rather than exercising real kernel
      # behavior (see tun_parity.rs's tun_or_skip! macro). Root via
      # sudo has the capability, so re-run just that suite privileged
      # to keep genuine live coverage in CI instead of silently losing
      # it on every run.
      - name: test platform-linux tun surface (privileged)
        if: matrix.os == 'ubuntu-latest' && matrix.toolchain == 'stable'
        run: sudo -E env "PATH=$PATH" cargo test -p platform-linux --test tun_parity

  # rustils#48: platform-macos's own real-hardware verification. A
  # separate job, not a `test` matrix leg — `cargo test --workspace` on
  # macOS would also try to build coreutils' bin targets, which call
  # `coreutils::native::spawner()` unconditionally; that module is gated
  # `#[cfg(any(target_os = "linux", windows))]` because platform-macos is
  # deliberately net-only (no process/fs slice — RFC v2 §3, no consumer
  # has forced one), so those bins simply don't compile there yet. Scoped
  # to the three crates that actually run on macOS today, the same
  # per-job scoping `miri` and `cross-compile-check` already use for
  # what they can and can't cover.
  macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - name: clippy (warnings are errors)
        run: cargo clippy -p platform -p platform-mock -p platform-macos --all-targets -- -D warnings
      - name: test
        run: cargo test -p platform -p platform-mock -p platform-macos

  unsafe-scope:
    # RFC v2 §6: unsafe is confined to backend sys/ module trees. This job
    # fails if `unsafe` appears anywhere else. Grep-based on purpose —
    # simple enough to trust, strict enough to catch drift.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: unsafe outside sys/ fails the build
        run: |
          violations=$(grep -rn "unsafe" crates/*/src --include='*.rs' \
            | grep -v "/sys/" \
            | grep -v "forbid(unsafe_code)" \
            | grep -v "deny(unsafe_code)" \
            | grep -v "unsafe_code = " \
            | grep -v ':[[:space:]]*//' \
            || true)
          if [ -n "$violations" ]; then
            echo "unsafe found outside sys/ module trees:"; echo "$violations"; exit 1
          fi

  deny:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-deny
      - run: cargo deny check

  # RFC v2 §4.2: Miri on everything it can execute — the pure crates
  # (platform, platform-mock, winargv, coreutils' library tests). The
  # backend crates make foreign calls Miri cannot model and are excluded.
  miri:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: miri
      # winargv is pure string logic with no OS calls (extracted to its
      # own crate, convergence roadmap Phase 1c) — exactly what Miri
      # should cover; platform-windows's own lib is windows-gated to
      # nothing on this host now, kept in the list for when that changes.
      - run: cargo miri test -p platform -p platform-mock -p platform-windows -p winargv -p coreutils --lib

  # Fast Windows feedback without waiting on a windows-latest runner: a
  # cross-compile check from Linux catches most platform-windows compile
  # errors in minutes. The windows-latest matrix leg above remains the real
  # gate — this is a pre-check, not a replacement. (Practice borrowed from
  # rusty_win32, an R2 extraction donor — see docs/extraction-map.md.)
  cross-compile-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-gnu
          components: clippy
      - name: cargo check (windows target, all targets)
        run: cargo check --workspace --target x86_64-pc-windows-gnu --all-targets
      - name: cargo clippy (windows target, warnings are errors)
        run: cargo clippy --workspace --target x86_64-pc-windows-gnu --all-targets -- -D warnings
