name: fuzz

# RFC v2 §4.2/§9.5: the nightly fuzz job. The winargv round-trip target
# runs the builder against an independent model of the MSVCRT splitting
# rules (the deterministic CommandLineToArgvW oracle on the Windows CI
# leg anchors that model to the real OS).

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

jobs:
  winargv:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-fuzz
      - name: model self-check (deterministic differential tests)
        run: cargo test --manifest-path fuzz/Cargo.toml
      - name: fuzz winargv round-trip (5 minutes)
        run: cargo fuzz run winargv_roundtrip --fuzz-dir fuzz -- -max_total_time=300
