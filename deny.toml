# cargo-deny configuration — dependency policy enforcement (RFC v2 §4.2)

[licenses]
allow = ["MIT", "Apache-2.0", "Unicode-DFS-2016", "Unicode-3.0"]
# Workspace crates are unpublished (publish = false) and deliberately
# unlicensed until the project's license question is decided (see README
# "License"); the license gate applies to dependencies, not to them.
private = { ignore = true }

[bans]
multiple-versions = "warn"
# ADR-004 (rush) / RFC v2 §5: the core is synchronous; no async runtime may enter the tree.
deny = [
    { name = "tokio" },
    { name = "async-std" },
]

[advisories]
yanked = "deny"
