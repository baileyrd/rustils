# cargo-deny configuration — dependency policy enforcement (RFC v2 §4.2)

[licenses]
allow = ["MIT", "Apache-2.0", "Unicode-DFS-2016", "Unicode-3.0"]

[bans]
multiple-versions = "warn"
# ADR-004 (rush) / RFC v2 §5: the core is synchronous; no async runtime may enter the tree.
deny = [
    { name = "tokio" },
    { name = "async-std" },
]

[advisories]
yanked = "deny"

[sources]
# D-12: rusty_libc is a deliberate rev-pinned git dependency (the Track P
# backend). Any other git source is a policy violation, not a warning.
unknown-git = "deny"
allow-git = ["https://github.com/baileyrd/rusty_libc"]
