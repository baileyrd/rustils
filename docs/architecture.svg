<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 790" font-family="ui-sans-serif, system-ui, 'Segoe UI', Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#5b6472"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="980" height="790" fill="#ffffff"/>
  <text x="24" y="34" font-size="19" font-weight="700" fill="#1f2530">rustils — target architecture: four layers, plus the beside-the-PAL shelf</text>
  <text x="24" y="54" font-size="12" fill="#5b6472">docs/architecture.md (A3, adopted 2026-07-19) · shelf additions per docs/design-discussion-tls.md + ecosystem survey (2026-07-21)</text>

  <!-- ══════════ LAYER 3 — Application ══════════ -->
  <rect x="24" y="74" width="640" height="132" rx="8" fill="#eef3fa" stroke="#7d97bd" stroke-width="1.5"/>
  <text x="40" y="98" font-size="14" font-weight="700" fill="#2a4468">LAYER 3 — Application</text>
  <text x="40" y="120" font-size="13" fill="#1f2530">rush · coreutils · rusty_tail · rusty_naner · rusty_lsp</text>
  <text x="40" y="139" font-size="13" fill="#1f2530">SHH · rusty_rdp · rusty_whisper · rusty_llama · nexus</text>
  <text x="40" y="158" font-size="13" fill="#1f2530">rusty_request <tspan fill="#5b6472">(HTTP client, on rusty_tokio — surveyed 2026-07-21)</tspan></text>
  <text x="40" y="180" font-size="12" fill="#5b6472" font-style="italic">parallel, non-converging by choice: rusty_provider (tokio/reqwest stack)</text>

  <!-- ══════════ Runtime strip ══════════ -->
  <rect x="24" y="222" width="640" height="52" rx="8" fill="#f6f1e7" stroke="#bda774" stroke-width="1.5"/>
  <text x="40" y="244" font-size="14" font-weight="700" fill="#6b5926">RUNTIME — rusty_tokio</text>
  <text x="40" y="263" font-size="12.5" fill="#1f2530">hand-rolled async runtime; reactor built on the PAL's raw-fd / nonblocking seam (#41 / #48 / #59) · stays TLS-free</text>

  <!-- ══════════ LAYER 2 — PAL ══════════ -->
  <rect x="24" y="290" width="640" height="116" rx="8" fill="#eef7ef" stroke="#7dab84" stroke-width="1.5"/>
  <text x="40" y="314" font-size="14" font-weight="700" fill="#2c5c34">LAYER 2 — Platform Abstraction Layer (platform crate)</text>
  <text x="40" y="336" font-size="13" fill="#1f2530">Fs · Process · Events · Net (TCP/Unix/UDP) · Tun · Security (Csprng, Sandbox)</text>
  <text x="40" y="355" font-size="13" fill="#1f2530">errors · parity · mock</text>
  <text x="40" y="377" font-size="12" fill="#5b6472">gated (§3): Terminal · Windowing · Registry/Config · CredentialStore · trust-anchor access (“B1”, best-effort — gate unmet, leaning wait)</text>
  <text x="40" y="395" font-size="12" fill="#5b6472" font-style="italic">no TLS concept in any trait — permanent, by design (D16 / net.md)</text>

  <!-- ══════════ LAYER 1 — OS Implementation ══════════ -->
  <rect x="24" y="422" width="640" height="86" rx="8" fill="#f4eef7" stroke="#a184b3" stroke-width="1.5"/>
  <text x="40" y="446" font-size="14" font-weight="700" fill="#5a3d6e">LAYER 1 — OS Implementation (all unsafe lives here)</text>
  <text x="40" y="468" font-size="13" fill="#1f2530">platform-linux (libc floor · rusty_libc track-p) · platform-windows (windows-sys floor)</text>
  <text x="40" y="487" font-size="13" fill="#1f2530">platform-macos <tspan fill="#5b6472">(net-only slice, rustils#48)</tspan></text>

  <!-- ══════════ LAYER 0 — OS Kernel ══════════ -->
  <rect x="24" y="524" width="640" height="60" rx="8" fill="#f1f2f4" stroke="#8b93a1" stroke-width="1.5"/>
  <text x="40" y="548" font-size="14" font-weight="700" fill="#3c4450">LAYER 0 — OS Kernel</text>
  <text x="40" y="570" font-size="13" fill="#1f2530">Linux kernel ABI · Windows NT kernel · XNU (BSD sockets slice)</text>

  <!-- ══════════ Beside-the-PAL shelf ══════════ -->
  <rect x="692" y="74" width="264" height="616" rx="8" fill="#fbf3f3" stroke="#bb8383" stroke-width="1.5"/>
  <text x="708" y="98" font-size="14" font-weight="700" fill="#7a3b3b">BESIDE THE PAL</text>
  <text x="708" y="116" font-size="11.5" fill="#5b6472">OS-independent protocol / format</text>
  <text x="708" y="131" font-size="11.5" fill="#5b6472">libraries — serve the applications,</text>
  <text x="708" y="146" font-size="11.5" fill="#5b6472">need no abstraction layer</text>

  <!-- built -->
  <rect x="708" y="158" width="232" height="52" rx="6" fill="#ffffff" stroke="#bb8383"/>
  <text x="722" y="177" font-size="12.5" font-weight="700" fill="#1f2530">rusty_lines · rusty_regx</text>
  <text x="722" y="194" font-size="11.5" fill="#5b6472">built — line editing, regex</text>

  <!-- planned: rusty_tls -->
  <rect x="708" y="220" width="232" height="86" rx="6" fill="#ffffff" stroke="#bb8383" stroke-dasharray="5 4"/>
  <text x="722" y="239" font-size="12.5" font-weight="700" fill="#1f2530">rusty_tls <tspan font-weight="400" fill="#7a3b3b">(planned)</tspan></text>
  <text x="722" y="256" font-size="11.5" fill="#5b6472">sans-IO TLS engine (wraps rustls);</text>
  <text x="722" y="271" font-size="11.5" fill="#5b6472">one verify-by-default trust policy;</text>
  <text x="722" y="286" font-size="11.5" fill="#5b6472">sync + async adapters · consumers:</text>
  <text x="722" y="301" font-size="11.5" fill="#5b6472">rusty_request, rusty_rdp, rusty_tail</text>

  <!-- planned: rusty_http -->
  <rect x="708" y="316" width="232" height="86" rx="6" fill="#ffffff" stroke="#bb8383" stroke-dasharray="5 4"/>
  <text x="722" y="335" font-size="12.5" font-weight="700" fill="#1f2530">rusty_http <tspan font-weight="400" fill="#7a3b3b">(planned)</tspan></text>
  <text x="722" y="352" font-size="11.5" fill="#5b6472">sans-IO HTTP/1.1 + Url — gate met:</text>
  <text x="722" y="367" font-size="11.5" fill="#5b6472">6 hand-rolls live (rusty_request ×3,</text>
  <text x="722" y="382" font-size="11.5" fill="#5b6472">rusty_tail ×4 incl. a server); donor:</text>
  <text x="722" y="397" font-size="11.5" fill="#5b6472">rusty_request http1.rs / url.rs</text>

  <!-- planned: rusty_json -->
  <rect x="708" y="412" width="232" height="54" rx="6" fill="#ffffff" stroke="#bb8383" stroke-dasharray="2 4"/>
  <text x="722" y="431" font-size="12.5" font-weight="700" fill="#1f2530">rusty_json <tspan font-weight="400" fill="#7a3b3b">(optional)</tspan></text>
  <text x="722" y="448" font-size="11.5" fill="#5b6472">donor: rusty_request json.rs (528 ln);</text>
  <text x="722" y="462" font-size="11.5" fill="#5b6472">nexus unverified — extract on reach</text>

  <!-- planned: rusty_wire -->
  <rect x="708" y="476" width="232" height="70" rx="6" fill="#ffffff" stroke="#bb8383" stroke-dasharray="5 4"/>
  <text x="722" y="495" font-size="12.5" font-weight="700" fill="#1f2530">rusty_wire <tspan font-weight="400" fill="#7a3b3b">(planned*)</tspan></text>
  <text x="722" y="512" font-size="11.5" fill="#5b6472">byte cursor Reader/Writer, endian-</text>
  <text x="722" y="527" font-size="11.5" fill="#5b6472">explicit core · donors: rdp cursor.rs,</text>
  <text x="722" y="542" font-size="11.5" fill="#5b6472">shh wire/ · foundation for ansder</text>

  <!-- planned: rusty_ansder -->
  <rect x="708" y="556" width="232" height="86" rx="6" fill="#ffffff" stroke="#bb8383" stroke-dasharray="5 4"/>
  <text x="722" y="575" font-size="12.5" font-weight="700" fill="#1f2530">rusty_ansder <tspan font-weight="400" fill="#7a3b3b">(planned*)</tspan></text>
  <text x="722" y="592" font-size="11.5" fill="#5b6472">ASN.1/DER TLV + typed layer, on</text>
  <text x="722" y="607" font-size="11.5" fill="#5b6472">rusty_wire · donor: rdp ber.rs +</text>
  <text x="722" y="622" font-size="11.5" fill="#5b6472">krb5/asn1.rs (layered, near-whole);</text>
  <text x="722" y="637" font-size="11.5" fill="#5b6472">X.509 a gated row (rusty_tls)</text>

  <!-- notes -->
  <text x="708" y="662" font-size="10.5" fill="#5b6472" font-style="italic">* owner override of the “rows only” default</text>
  <text x="708" y="678" font-size="10.5" fill="#5b6472" font-style="italic">declined: crypto primitives, base64</text>

  <!-- ══════════ Arrows ══════════ -->
  <line x1="344" y1="206" x2="344" y2="220" stroke="#5b6472" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="344" y1="274" x2="344" y2="288" stroke="#5b6472" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="344" y1="406" x2="344" y2="420" stroke="#5b6472" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="344" y1="508" x2="344" y2="522" stroke="#5b6472" stroke-width="1.5" marker-end="url(#arrow)"/>
  <!-- apps use the shelf -->
  <line x1="666" y1="140" x2="690" y2="140" stroke="#5b6472" stroke-width="1.5" marker-end="url(#arrow)"/>
  <!-- rusty_tls layers over the runtime's stream -->
  <line x1="690" y1="266" x2="666" y2="248" stroke="#5b6472" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#arrow)"/>
  <text x="600" y="286" font-size="10.5" fill="#5b6472">wraps the plain stream</text>

  <text x="24" y="720" font-size="12" fill="#5b6472">Consumers pull the PAL into shape; the PAL never speculates (§3). Shelf libraries follow the same gate: extracted only where two-plus repos</text>
  <text x="24" y="738" font-size="12" fill="#5b6472">demonstrably duplicate the logic today (* = explicit owner override). TLS layers over the plain stream above the trait boundary — never inside Net.</text>
  <text x="24" y="756" font-size="12" fill="#5b6472">Shelf build order: rusty_wire → rusty_ansder (depends on it); rusty_tls, rusty_http, rusty_json independent.</text>
</svg>
